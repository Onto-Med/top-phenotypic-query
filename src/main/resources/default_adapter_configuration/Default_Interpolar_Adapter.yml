# This adapter can be used for querying INTERPOLAR databases that are the result of the ETL process defined and
# implemented in https://github.com/medizininformatik-initiative/INTERPOLAR.
# The ETL process stores the data in a PostgreSQL database "cds_hub_db" under various schemas
# (see https://github.com/medizininformatik-initiative/INTERPOLAR/blob/main/Dataflow.md).
#
# In the context of INTERPOLAR, the TOP Framework is considered as a so called "data processor".
# Access to the database is restricted to the schemas "db2dataprocessor_out" (read) and "db2dataprocessor_in" (write).
#
# Per default, data processors should use the PostgreSQL user "db2dataprocessor_user"
# (see https://github.com/medizininformatik-initiative/INTERPOLAR/blob/main/Postgres-cds_hub/DB_description.md#rechtekonzept).
#
# The adapter has been tested using the synthetic sample data set imported from
# https://github.com/medizininformatik-initiative/kerndatensatz-testdaten.
#
# As the test data is missing encounter class codes, it is recommended to execute the following SQL update statements
# after the import:
#
# UPDATE db2dataprocessor_out.v_encounter_last_version
# SET
#	  enc_class_system = 'http://terminology.hl7.org/CodeSystem/v3-ActCode',
#	  enc_class_display = 'inpatient encounter',
#     enc_class_code = 'IMP'
# WHERE enc_id < 'UKB-0009-E-1';
#
# UPDATE db2dataprocessor_out.v_encounter_last_version
# SET
#     enc_class_system = 'http://terminology.hl7.org/CodeSystem/v3-ActCode',
#     enc_class_display = 'ambulatory',
#     enc_class_code = 'AMB'
# WHERE enc_id >= 'UKB-0009-E-1';
baseId: encounter
subjectQuery:
  baseQuery: "SELECT enc_id, pat_birthdate, pat_gender FROM db2dataprocessor_out.v_patient_last_version, db2dataprocessor_out.v_encounter_last_version\nWHERE enc_patient_ref = 'Patient/' || pat_id"
  sexListPart: "\nAND pat_gender IN ({values})"
  birthdateIntervalPart: "\nAND pat_birthdate {operator} {value}"
  output:
    id: enc_id
    sex: pat_gender
    birthdate: pat_birthdate
phenotypeQueries:
  encounter:
    baseQuery: "SELECT enc_id, enc_period_start, enc_period_end, enc_class_code FROM db2dataprocessor_out.v_encounter_last_version\nWHERE TRUE"
    textValueListPart: "\nAND enc_class_code IN ({values})"
    startDateTimeIntervalPart: "\nAND enc_period_start {operator} {value}"
    endDateTimeIntervalPart: "\nAND (enc_period_end IS NULL OR enc_period_end {operator} {value})"
    output:
      subject: enc_id
      textValue: enc_class_code
      startDateTime: enc_period_start
      endDateTime: enc_period_end
  observation:
    baseQuery: "SELECT SUBSTRING(obs_encounter_calculated_ref FROM 11) AS enc_id, obs_effectivedatetime, obs_valuequantity_value FROM db2dataprocessor_out.v_observation_last_version\nWHERE obs_valuequantity_value IS NOT NULL AND obs_code_system || '|' || obs_code_code IN ({codes})"
    numberValueIntervalPart: "\nAND obs_valuequantity_value {operator} {value}"
    numberValueListPart: "\nAND obs_valuequantity_value IN ({values})"
    dateTimeIntervalPart: "\nAND obs_effectivedatetime {operator} {value}"
    output:
      subject: enc_id
      numberValue: obs_valuequantity_value
      dateTime: obs_effectivedatetime
  condition:
    baseQuery: |
      SELECT
        SUBSTRING(con.con_encounter_calculated_ref FROM 11) AS enc_id,
        con.con_onsetperiod_start AS start_date_time,
        con.con_onsetperiod_end AS end_date_time,
        CASE
          WHEN con.con_onsetperiod_start IS NULL AND con.con_onsetperiod_end IS NULL AND con.con_onsetdatetime IS NULL
          THEN con.con_recordeddate
          ELSE con.con_onsetdatetime
        END
        AS date_time 
      FROM
        db2dataprocessor_out.v_condition_last_version con
      WHERE
        con_code_system || '|' || con_code_code IN ({codes})
    startDateTimeIntervalPart: |
      AND
      CASE
        WHEN con.con_onsetperiod_start IS NOT NULL OR (con.con_onsetperiod_start IS NULL AND con.con_onsetperiod_end IS NULL)
          THEN COALESCE(con.con_onsetperiod_start, con.con_onsetdatetime, con.con_recordeddate) {operator} {value}
        ELSE true
      END
    endDateTimeIntervalPart: |
      AND
      CASE
        WHEN con.con_onsetperiod_end IS NOT NULL OR (con.con_onsetperiod_start IS NULL AND con.con_onsetperiod_end IS NULL)
          THEN COALESCE(con.con_onsetperiod_end, con.con_onsetdatetime, con.con_recordeddate) {operator} {value}
        ELSE true
      END
    output:
      subject: enc_id
      startDateTime: start_date_time
      endDateTime: end_date_time
      dateTime: date_time
  procedure:
    baseQuery: |
      SELECT 
          SUBSTRING(proc.proc_encounter_calculated_ref FROM 11) AS enc_id,
          proc.proc_performedperiod_start AS start_date_time,
          proc.proc_performedperiod_end AS end_date_time,
          proc.proc_performeddatetime AS date_time
      FROM 
          db2dataprocessor_out.v_procedure_last_version proc
      WHERE 
      	proc_code_system || '|' || proc_code_code IN ({codes})
    startDateTimeIntervalPart: |
        AND 
          CASE
            WHEN proc.proc_performedperiod_start IS NOT NULL OR (proc.proc_performedperiod_start IS NULL AND proc.proc_performedperiod_end IS NULL)
              THEN COALESCE(proc.proc_performedperiod_start, proc.proc_performeddatetime) {operator} {value}
            ELSE true
          END
    endDateTimeIntervalPart: |
        AND
          CASE
            WHEN proc.proc_performedperiod_end IS NOT NULL OR (proc.proc_performedperiod_start IS NULL AND proc.proc_performedperiod_end IS NULL)
              THEN COALESCE(proc.proc_performedperiod_end, proc.proc_performeddatetime) {operator} {value}
            ELSE true
          END
    output:
      subject: enc_id
      startDateTime: start_date_time
      endDateTime: end_date_time
      dateTime: date_time
  medication:
    union: [ medication_administration, medication_statement, medication_request ]
  medication_administration:
    baseQuery: |
      SELECT
          SUBSTRING(medadm.medadm_encounter_calculated_ref FROM 11) AS enc_id,
          medadm.medadm_effectiveperiod_start AS start_date_time,
          medadm.medadm_effectiveperiod_end AS end_date_time,
          medadm.medadm_effectivedatetime AS date_time
      FROM
          db2dataprocessor_out.v_medicationadministration_last_version medadm,
          db2dataprocessor_out.v_medication_last_version med
      WHERE
          medadm.medadm_medicationreference_ref = 'Medication/' || med.med_id
          AND med.med_code_system || '|' || med.med_code_code IN ({codes})
    startDateTimeIntervalPart: |
          AND
            CASE
              WHEN medadm.medadm_effectiveperiod_start IS NOT NULL OR (medadm.medadm_effectiveperiod_start IS NULL AND medadm.medadm_effectiveperiod_end IS NULL)
                THEN COALESCE(medadm.medadm_effectiveperiod_start, medadm.medadm_effectivedatetime) {operator} {value}
              ELSE true
            END
    endDateTimeIntervalPart: |
          AND
            CASE
              WHEN medadm.medadm_effectiveperiod_end IS NOT NULL OR (medadm.medadm_effectiveperiod_start IS NULL AND medadm.medadm_effectiveperiod_end IS NULL)
                THEN COALESCE(medadm.medadm_effectiveperiod_end, medadm.medadm_effectivedatetime) {operator} {value}
              ELSE true
            END
    output:
      subject: enc_id
      startDateTime: start_date_time
      endDateTime: end_date_time
      dateTime: date_time
  medication_statement:
    baseQuery: |
      SELECT
          SUBSTRING(medstat.medstat_encounter_calculated_ref FROM 11) AS enc_id,
          medstat.medstat_effectiveperiod_start AS start_date_time,
          medstat.medstat_effectiveperiod_end AS end_date_time,
          medstat.medstat_effectivedatetime AS date_time
      FROM
          db2dataprocessor_out.v_medicationstatement_last_version medstat,
          db2dataprocessor_out.v_medication_last_version med
      WHERE
          medstat.medstat_medicationreference_ref = 'Medication/' || med.med_id
          AND med.med_code_system || '|' || med.med_code_code IN ({codes})
    startDateTimeIntervalPart: |
      AND
        CASE
          WHEN medstat.medstat_effectiveperiod_start IS NOT NULL OR (medstat.medstat_effectiveperiod_start IS NULL AND medstat.medstat_effectiveperiod_end IS NULL)
            THEN COALESCE(medstat.medstat_effectiveperiod_start, medstat.medstat_effectivedatetime) {operator} {value}
          ELSE true
        END
    endDateTimeIntervalPart: |
      AND
        CASE
          WHEN medstat.medstat_effectiveperiod_end IS NOT NULL OR (medstat.medstat_effectiveperiod_start IS NULL AND medstat.medstat_effectiveperiod_end IS NULL)
            THEN COALESCE(medstat.medstat_effectiveperiod_end, medstat.medstat_effectivedatetime) {operator} {value}
          ELSE true
        END
    output:
      subject: enc_id
      startDateTime: start_date_time
      endDateTime: end_date_time
      dateTime: date_time
  medication_request:
    baseQuery: "SELECT SUBSTRING(medreq_encounter_calculated_ref FROM 11) AS enc_id, medreq_authoredon AS datetime FROM db2dataprocessor_out.v_medicationrequest_last_version, db2dataprocessor_out.v_medication_last_version\nWHERE medreq_medicationreference_ref = 'Medication/' || med_id AND med_code_system || '|' || med_code_code IN ({codes})"
    dateTimeIntervalPart: "\nAND medreq_authoredon {operator} {value}"
    output:
      subject: enc_id
      dateTime: datetime
birthdateMapping:
  code: http://loinc.org|21112-8
ageMapping:
  code: http://loinc.org|30525-0
sexMapping:
  code: http://loinc.org|46098-0
